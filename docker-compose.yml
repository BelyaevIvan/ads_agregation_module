services:

  # ── Инфраструктура ─────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: brandhunt_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: brandhunt_minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: brandhunt_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── Мониторинг ─────────────────────────────────────────────────────────
  # Модель ollama скачивается один раз вручную:
  #   docker exec -it brandhunt_ollama ollama pull gemma3:4b

  tg-monitor:
    build: ./backend/monitor-service
    container_name: brandhunt_tg_monitor
    command: python tg_monitor.py
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      OLLAMA_HOST: http://ollama:11434
      TG_SESSION_PATH: /app/sessions/telethon_session
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - tg_sessions:/app/sessions

  vk-monitor:
    build: ./backend/monitor-service
    container_name: brandhunt_vk_monitor
    command: python vk_monitor.py
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: minio:9000
      OLLAMA_HOST: http://ollama:11434
      VK_STATE_FILE: /app/data/vk_state.json
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - vk_data:/app/data

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  tg_sessions:
  vk_data:
